<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="cc-title cc-desc">
  <title id="cc-title">Concurrently akışı infografiği</title>
  <desc id="cc-desc">Tek komutun frontend, backend ve diğer servisleri paralel çalıştırdığını gösteren akış</desc>
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffe4d6" />
    </linearGradient>
    <filter id="cc-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c2410c" flood-opacity="0.12" />
    </filter>
    <marker id="cc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c" />
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#cc-bg)" />

  <text x="600" y="80" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800" fill="#1a1a1f">Concurrently — Tek Komut, N Süreç</text>
  <text x="600" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#5b5b67">Frontend · Backend · Watcher · Test — hepsi paralel</text>

  <!-- Single command -->
  <g filter="url(#cc-shadow)">
    <rect x="350" y="180" width="500" height="100" rx="20" fill="#0e0e12" />
    <text x="600" y="215" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#878793">npm run dev</text>
    <text x="600" y="248" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" fill="#fb923c">concurrently "npm:dev:*"</text>
    <text x="600" y="270" text-anchor="middle" font-family="Inter" font-size="12" fill="#878793">↓ paralel başlatılır ↓</text>
  </g>

  <!-- Branch arrows -->
  <line x1="600" y1="290" x2="200" y2="370" stroke="#c2410c" stroke-width="3" marker-end="url(#cc-arrow)" />
  <line x1="600" y1="290" x2="450" y2="370" stroke="#c2410c" stroke-width="3" marker-end="url(#cc-arrow)" />
  <line x1="600" y1="290" x2="750" y2="370" stroke="#c2410c" stroke-width="3" marker-end="url(#cc-arrow)" />
  <line x1="600" y1="290" x2="1000" y2="370" stroke="#c2410c" stroke-width="3" marker-end="url(#cc-arrow)" />

  <!-- Process cards -->
  <g filter="url(#cc-shadow)">
    <rect x="80" y="380" width="240" height="200" rx="16" fill="#ffffff" stroke="#d8d8de" />
    <rect x="80" y="380" width="240" height="6" rx="3" fill="#3b82f6" />
    <text x="200" y="420" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#3b82f6">[WEB]</text>
    <text x="200" y="448" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#1a1a1f">next dev</text>
    <text x="200" y="476" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">port 3000</text>
    <text x="200" y="500" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">React frontend</text>
    <text x="200" y="540" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#10b981">● running</text>
  </g>

  <g filter="url(#cc-shadow)">
    <rect x="340" y="380" width="240" height="200" rx="16" fill="#ffffff" stroke="#d8d8de" />
    <rect x="340" y="380" width="240" height="6" rx="3" fill="#10b981" />
    <text x="460" y="420" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#10b981">[API]</text>
    <text x="460" y="448" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#1a1a1f">json-server</text>
    <text x="460" y="476" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">port 3001</text>
    <text x="460" y="500" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">mock REST API</text>
    <text x="460" y="540" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#10b981">● running</text>
  </g>

  <g filter="url(#cc-shadow)">
    <rect x="600" y="380" width="240" height="200" rx="16" fill="#ffffff" stroke="#d8d8de" />
    <rect x="600" y="380" width="240" height="6" rx="3" fill="#ec4899" />
    <text x="720" y="420" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#ec4899">[CSS]</text>
    <text x="720" y="448" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#1a1a1f">tailwind</text>
    <text x="720" y="476" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">--watch</text>
    <text x="720" y="500" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">CSS rebuild</text>
    <text x="720" y="540" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#10b981">● running</text>
  </g>

  <g filter="url(#cc-shadow)">
    <rect x="860" y="380" width="240" height="200" rx="16" fill="#ffffff" stroke="#d8d8de" />
    <rect x="860" y="380" width="240" height="6" rx="3" fill="#8b5cf6" />
    <text x="980" y="420" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#8b5cf6">[TYPE]</text>
    <text x="980" y="448" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#1a1a1f">tsc --watch</text>
    <text x="980" y="476" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">type check</text>
    <text x="980" y="500" text-anchor="middle" font-family="Inter" font-size="13" fill="#5b5b67">incremental</text>
    <text x="980" y="540" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#10b981">● running</text>
  </g>

  <!-- Footer features -->
  <g>
    <rect x="80" y="640" width="1040" height="120" rx="20" fill="#0e0e12" />
    <text x="600" y="680" text-anchor="middle" font-family="Inter" font-size="18" font-weight="700" fill="#fb923c">Renkli loglar · Ortak terminal · Tek Ctrl+C → hepsi kapanır</text>

    <text x="240" y="730" text-anchor="middle" font-family="Inter" font-size="13" fill="#d8d8de">--kill-others</text>
    <text x="240" y="748" text-anchor="middle" font-family="Inter" font-size="11" fill="#878793">biri ölünce hepsi kapanır</text>

    <text x="500" y="730" text-anchor="middle" font-family="Inter" font-size="13" fill="#d8d8de">--names WEB,API</text>
    <text x="500" y="748" text-anchor="middle" font-family="Inter" font-size="11" fill="#878793">etiketli loglar</text>

    <text x="760" y="730" text-anchor="middle" font-family="Inter" font-size="13" fill="#d8d8de">npm:dev:*</text>
    <text x="760" y="748" text-anchor="middle" font-family="Inter" font-size="11" fill="#878793">glob pattern desteği</text>

    <text x="1000" y="730" text-anchor="middle" font-family="Inter" font-size="13" fill="#d8d8de">cross-platform</text>
    <text x="1000" y="748" text-anchor="middle" font-family="Inter" font-size="11" fill="#878793">Win · macOS · Linux</text>
  </g>
</svg>
